<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원전 공정 애니메이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --p:#1f1f1d; --s:#73726c; --t:#9c9a92;
    --bg:#faf9f5; --bg2:#f1efe8; --b:#b4b2a9; --bl:#dcdad2;
    --info:#185FA5;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:24px;
    background:var(--bg); color:var(--p);
    font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:22px;font-weight:500;margin:0 0 4px}
  .sub{font-size:14px;color:var(--s);margin:0 0 20px}
  .card{background:#fff;border:1px solid var(--bl);border-radius:14px;padding:20px}
  svg{width:100%;height:auto;display:block}
  svg text{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif}
  .np-cap{background:var(--bg2);border-radius:8px;padding:12px 14px;margin:14px 0 0;font-size:14px;line-height:1.6;min-height:64px}
  .np-cap b{font-weight:500}
  .np-ctrl{display:flex;align-items:center;gap:8px;margin:12px 0 0;flex-wrap:wrap}
  button{font:inherit;font-size:13px;padding:7px 12px;border:0.5px solid var(--b);background:#fff;border-radius:8px;cursor:pointer;color:var(--p)}
  button:hover{background:var(--bg2)}
  button:active{transform:scale(.98)}
  .np-dots{display:flex;gap:6px;margin-left:4px}
  .np-dot{width:8px;height:8px;border-radius:50%;background:var(--b)}
  .np-dot.on{background:var(--info)}
  .part{transition:opacity .4s}
  .part.dim{opacity:.22}
  .legend{display:flex;gap:16px;margin:12px 0 0;font-size:12px;color:var(--s);flex-wrap:wrap}
  .sw{display:inline-block;width:14px;height:3px;vertical-align:middle;margin-right:5px;border-radius:2px}
  @media (prefers-reduced-motion: no-preference){
    @keyframes flow { to { stroke-dashoffset:-24; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes rise { 0%{opacity:.5;transform:translateY(0)} 100%{opacity:0;transform:translateY(-20px)} }
    @keyframes flick { 0%,100%{opacity:.85} 50%{opacity:.45} }
    .flow{stroke-dasharray:3 9;stroke-linecap:round;animation:flow 1.1s linear infinite}
    #blades{transform-origin:387px 193px;animation:spin .7s linear infinite}
    #coil{animation:pulse 1.2s ease-in-out infinite}
    #spark{animation:flick .5s ease-in-out infinite}
    #bolt{animation:pulse .8s ease-in-out infinite}
    .puff{animation:rise 2.4s ease-out infinite}
    .puff:nth-child(2){animation-delay:.8s}.puff:nth-child(3){animation-delay:1.6s}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>원전 공정 애니메이션 (가압경수로)</h1>
  <p class="sub">냉각재·증기·전기가 흐르는 전체 공정. "단계별로 보기"로 각 설비 역할을 짚어보세요.</p>
  <div class="card">
  <svg viewBox="0 0 680 410" role="img" aria-label="원자력발전소 공정 흐름 애니메이션">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    </defs>

    <rect x="44" y="138" width="256" height="212" rx="14" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="5 5"/>
    <text x="52" y="156" font-size="11" fill="var(--t)">격납건물 (1차 계통)</text>

    <g class="part" data-id="loop-primary">
      <rect x="162" y="226" width="46" height="86" rx="6" fill="#D85A30" fill-opacity="0.08" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 4"/>
      <path class="flow" d="M160,240 H206" fill="none" stroke="#D85A30" stroke-width="4" marker-end="url(#arrow)"/>
      <path class="flow" d="M210,300 H160" fill="none" stroke="#D85A30" stroke-width="4" marker-end="url(#arrow)"/>
      <circle cx="185" cy="300" r="7" fill="none" stroke="#993C1D" stroke-width="1.5"/>
      <text x="185" y="266" text-anchor="middle" font-size="11" fill="#993C1D">고온</text>
      <text x="185" y="290" text-anchor="middle" font-size="11" fill="#993C1D">저온</text>
    </g>

    <g class="part" data-id="reactor">
      <rect x="70" y="218" width="90" height="100" rx="10" fill="var(--bg2)" stroke="#993C1D" stroke-width="0.5"/>
      <rect id="glow" x="82" y="248" width="66" height="52" rx="6" fill="#E8593C" opacity="0.55"/>
      <g stroke="#993C1D" stroke-width="2" opacity="0.6"><line x1="94" y1="250" x2="94" y2="298"/><line x1="108" y1="250" x2="108" y2="298"/><line x1="122" y1="250" x2="122" y2="298"/><line x1="136" y1="250" x2="136" y2="298"/></g>
      <g id="spark" fill="#E0A106"><circle cx="102" cy="266" r="2.5"/><circle cx="128" cy="280" r="2.5"/><circle cx="116" cy="290" r="2"/></g>
      <text x="115" y="236" text-anchor="middle" font-size="14" font-weight="500" fill="#993C1D">원자로</text>
      <text x="115" y="334" text-anchor="middle" font-size="12" fill="var(--s)">핵분열 · 발열</text>
    </g>

    <g class="part" data-id="sg">
      <rect x="210" y="165" width="68" height="158" rx="12" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
      <path d="M222,308 q8,-14 15,0 q8,14 15,0 q8,-14 15,0" fill="none" stroke="#378ADD" stroke-width="1.5"/>
      <text x="244" y="210" text-anchor="middle" font-size="14" font-weight="500" fill="var(--p)">증기발생기</text>
      <text x="244" y="228" text-anchor="middle" font-size="12" fill="var(--s)">물 → 증기</text>
    </g>

    <g class="part" data-id="loop-secondary">
      <path class="flow" d="M244,165 V120 H385 V158" fill="none" stroke="#EF9F27" stroke-width="3.5" marker-end="url(#arrow)"/>
      <path class="flow" d="M387,224 V300" fill="none" stroke="#EF9F27" stroke-width="3" opacity="0.7" marker-end="url(#arrow)"/>
      <path class="flow" d="M395,354 V374 H244 V326" fill="none" stroke="#378ADD" stroke-width="3" marker-end="url(#arrow)"/>
      <circle cx="320" cy="374" r="7" fill="none" stroke="#185FA5" stroke-width="1.5"/>
    </g>

    <g class="part" data-id="turbine">
      <rect x="345" y="162" width="84" height="62" rx="10" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
      <g id="blades" fill="none" stroke="#534AB7" stroke-width="2.5"><line x1="387" y1="176" x2="387" y2="210"/><line x1="370" y1="193" x2="404" y2="193"/><line x1="375" y1="181" x2="399" y2="205"/><line x1="375" y1="205" x2="399" y2="181"/></g>
      <circle cx="387" cy="193" r="3" fill="#534AB7"/>
      <text x="387" y="240" text-anchor="middle" font-size="12" fill="var(--s)">터빈 · 회전</text>
    </g>

    <g class="part" data-id="generator">
      <rect x="448" y="162" width="68" height="62" rx="10" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
      <line x1="429" y1="193" x2="448" y2="193" stroke="#534AB7" stroke-width="3"/>
      <g id="coil" stroke="#BA7517" stroke-width="2.5" fill="none"><path d="M466,182 q7,-5 14,0 q7,5 14,0 q7,-5 14,0"/><path d="M466,193 q7,-5 14,0 q7,5 14,0 q7,-5 14,0"/><path d="M466,204 q7,-5 14,0 q7,5 14,0 q7,-5 14,0"/></g>
      <text x="482" y="240" text-anchor="middle" font-size="12" fill="var(--s)">발전기 · 전기</text>
      <polyline id="bolt" points="482,162 474,134 490,114 480,90 490,78" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M470,84 L482,58 L494,84 Z M474,77 H490" fill="none" stroke="#BA7517" stroke-width="1.5"/>
      <text x="482" y="50" text-anchor="middle" font-size="12" fill="var(--s)">송전</text>
    </g>

    <g class="part" data-id="condenser">
      <rect x="330" y="302" width="130" height="52" rx="10" fill="var(--bg2)" stroke="#185FA5" stroke-width="0.5"/>
      <g stroke="#378ADD" stroke-width="1.5" opacity="0.7"><line x1="342" y1="316" x2="448" y2="316"/><line x1="342" y1="328" x2="448" y2="328"/><line x1="342" y1="340" x2="448" y2="340"/></g>
      <text x="395" y="372" text-anchor="middle" font-size="12" fill="var(--s)">복수기 · 응축</text>
    </g>

    <g class="part" data-id="loop-cooling">
      <path class="flow" d="M460,318 H534" fill="none" stroke="#85B7EB" stroke-width="3" marker-end="url(#arrow)"/>
      <path class="flow" d="M534,340 H460" fill="none" stroke="#5DCAA5" stroke-width="3" marker-end="url(#arrow)"/>
    </g>

    <g class="part" data-id="cooling-tower">
      <path d="M540,335 Q556,280 552,238 L612,238 Q608,280 624,335 Z" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
      <g fill="#85B7EB"><circle class="puff" cx="572" cy="232" r="6"/><circle class="puff" cx="585" cy="230" r="7"/><circle class="puff" cx="598" cy="233" r="5"/></g>
      <text x="582" y="356" text-anchor="middle" font-size="12" fill="var(--s)">냉각탑 · 폐열</text>
    </g>
  </svg>

  <div class="np-cap" id="np-cap"><b>전체 공정:</b> 원자로의 핵분열열 → 1차 냉각재가 증기발생기로 운반 → 증기 생성 → 터빈·발전기로 전기 → 복수기에서 응축 → 냉각재가 폐열 방출. <b>"단계별로 보기"</b>로 각 설비 역할을 짚어보세요.</div>

  <div class="np-ctrl">
    <button onclick="npStep(-1)">◀ 이전</button>
    <button onclick="npStep(1)">단계별로 보기 ▶</button>
    <button onclick="npAll()">전체 보기</button>
    <span class="np-dots" id="np-dots"></span>
  </div>
  <div class="legend">
    <span><span class="sw" style="background:#D85A30"></span>1차 냉각재(열)</span>
    <span><span class="sw" style="background:#EF9F27"></span>증기</span>
    <span><span class="sw" style="background:#378ADD"></span>급수</span>
    <span><span class="sw" style="background:#85B7EB"></span>냉각수</span>
    <span><span class="sw" style="background:#BA7517"></span>전기</span>
  </div>
  </div>
</div>
<script>
  const steps = [
    {ids:['reactor'], h:'1. 원자로', d:'우라늄 핵분열로 막대한 열을 낸다. 모든 에너지의 출발점.'},
    {ids:['loop-primary'], h:'2. 1차 냉각재', d:'그 열을 증기발생기로 실어 나른다. 약 150기압 밀폐 고압수라 끓지 않고 순환한다. (노형마다 물질이 다름)'},
    {ids:['sg'], h:'3. 증기발생기', d:'1차 냉각재의 열로 2차측 물을 끓여 증기를 만든다. 두 물은 섞이지 않고 열만 주고받는 이중 냄비.'},
    {ids:['turbine'], h:'4. 터빈', d:'고압 증기가 날개를 때려 빠르게 회전시킨다. 열에너지 → 회전운동.'},
    {ids:['generator'], h:'5. 발전기', d:'터빈의 회전을 전자기 유도로 전기로 바꿔 송전한다.'},
    {ids:['condenser','loop-secondary'], h:'6. 복수기', d:'터빈을 빠져나온 증기를 식혀 물로 되돌리고, 2차 계통으로 재순환시킨다.'},
    {ids:['cooling-tower','loop-cooling'], h:'7. 냉각재', d:'응축에 쓴 폐열을 냉각탑(또는 해수)으로 외부에 버린다.'}
  ];
  let cur = -1;
  const parts = Array.from(document.querySelectorAll('.part'));
  const cap = document.getElementById('np-cap');
  const dotsBox = document.getElementById('np-dots');
  steps.forEach(()=>{const s=document.createElement('span');s.className='np-dot';dotsBox.appendChild(s);});
  const dots = Array.from(dotsBox.children);
  function render(){
    if(cur<0){
      parts.forEach(p=>p.classList.remove('dim'));
      dots.forEach(d=>d.classList.remove('on'));
      cap.innerHTML='<b>전체 공정:</b> 원자로의 핵분열열 → 1차 냉각재가 증기발생기로 운반 → 증기 생성 → 터빈·발전기로 전기 → 복수기에서 응축 → 냉각재가 폐열 방출. <b>"단계별로 보기"</b>로 각 설비 역할을 짚어보세요.';
      return;
    }
    const s = steps[cur];
    parts.forEach(p=>p.classList.toggle('dim', !s.ids.includes(p.dataset.id)));
    dots.forEach((d,i)=>d.classList.toggle('on', i===cur));
    cap.innerHTML='<b>'+s.h+'</b> — '+s.d;
  }
  function npStep(dir){ cur = Math.max(0, Math.min(steps.length-1, (cur<0?-1:cur)+dir)); render(); }
  function npAll(){ cur=-1; render(); }
  render();
</script>
</body>
</html>
